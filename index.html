<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopping List App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>🛒 Shopping List</h1>

    <section class="row">
      <input id="itemInput" placeholder="Add an item (e.g., Milk)" />
      <button id="addBtn">Add</button>
    </section>

    <section class="footerRow">
      <button id="clearDoneBtn" class="muted">Clear Done</button>
      <button id="clearAllBtn" class="danger">Clear All</button>
    </section>

    <ul id="list" class="list"></ul>

    <p class="hint">Tip: Click ✅ to mark done, 🗑️ to delete. Saved automatically.</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
